project_name: go-simple-monitor

before:
  hooks:
    - go mod tidy

builds:
  - id: go-simple-monitor
    main: ./cmd/server/main.go
    binary: go-simple-monitor
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"